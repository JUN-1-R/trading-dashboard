<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="0; url=./contract-trading/" />
  <title>合约交易训练系统</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111f;
      --panel: rgba(16, 28, 49, 0.92);
      --text: #e5edf8;
      --muted: #8ca0bd;
      --accent: #38bdf8;
      --line: rgba(148, 163, 184, 0.24);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(167, 139, 250, 0.16), transparent 32rem),
        var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    main {
      width: min(520px, 100%);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.34);
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(26px, 7vw, 38px);
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid rgba(56, 189, 248, 0.55);
      background: linear-gradient(135deg, rgba(14, 116, 144, 0.85), rgba(88, 28, 135, 0.65));
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }

    small {
      display: block;
      margin-top: 16px;
      color: var(--muted);
    }
  </style>
  <script>
    window.location.replace('./contract-trading/');
  </script>
</head>
<body>
  <main>
    <h1>合约交易训练系统</h1>
    <p>正在跳转到合约交易训练系统。如果没有自动跳转，请点击下面按钮进入。</p>
    <a href="./contract-trading/">进入合约交易训练系统</a>
    <small>部署入口：./contract-trading/</small>
  </main>
</body>
</html>
